department: app_factory
queue: zeze_app_factory_queue
allowed_tools:
  - file_read
  - file_edit
  - shell_test
  - browser_preview
  - git_status
  - git_log
  - git_diff
approval_required:
  - git_push
  - deploy
  - shell_exec
forbidden_tools:
  - live_trade
  - withdrawal
  - leverage
  - file_delete
risk_limits:
  max_shell_timeout_seconds: 60
  workspace_write_only: true
