name: Release Build
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install dependencies & Build
        run: |
          cd jarvis-client
          npm install
          npm run tauri build
