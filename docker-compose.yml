services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: zezelabs_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS:?RABBITMQ_PASS_REQUIRED}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zezelabs_network

  redis:
    image: redis:7-alpine
    container_name: zezelabs_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD_REQUIRED}
    networks:
      - zezelabs_network

  chromadb:
    image: chromadb/chroma:latest
    container_name: zezelabs_chroma
    ports:
      - "8000:8000"
    networks:
      - zezelabs_network

  n8n:
    image: n8nio/n8n:latest
    container_name: zezelabs_n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
    depends_on:
      - rabbitmq
    networks:
      - zezelabs_network

  # 🏛️ DEPARTMANLAR ══════════════════════════════════════════════════════

  orchestrator:
    build: .
    container_name: zeze_orchestrator
    command: python -u core/orchestrator/main.py
    environment: &base_env
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: guest
      RABBITMQ_PASS: ${RABBITMQ_PASS:?RABBITMQ_PASS_REQUIRED}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD_REQUIRED}
      CHROMA_HOST: zezelabs_chroma
      JARVIS_BRIDGE_URL: http://zeze_jarvis_bridge:7000/query
      OPENJARVIS_ROOT: /openjarvis
    volumes:
      - .:/app
      - ./openjarvis:/openjarvis
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - zezelabs_network

  zezelabs_bridge:
    build: .
    container_name: zeze_jarvis_bridge
    command: python -u core/jarvis_bridge_server.py
    restart: unless-stopped
    environment:
      <<: *base_env
    volumes:
      - .:/app
      - ./openjarvis:/openjarvis
    ports:
      - "7001:7000"
    networks:
      - zezelabs_network

